<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Shadowchess - Kiện Tướng Ẩn Mình</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #161512; color: #bababa; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .shadow-brand { font-size: 40px; font-weight: bold; color: #81b64c; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .container { display: flex; gap: 30px; background: #262522; padding: 30px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #board { width: 450px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .timer { font-size: 32px; font-weight: bold; text-align: center; background: #312e2b; padding: 10px; border-radius: 4px; border: 1px solid #403e3b; }
        .btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #81b64c; color: white; font-size: 18px; }
        .btn-play:hover { background: #96bc4b; }
        .btn-google { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { padding: 12px; background: #1c1b19; border: 1px solid #403e3b; color: white; border-radius: 4px; }
        .leaderboard { background: #1c1b19; padding: 15px; border-radius: 4px; font-size: 14px; }
        .leaderboard h4 { margin-top: 0; color: #81b64c; }
        table { width: 100%; text-align: left; border-collapse: collapse; }
        th { color: #888; font-weight: normal; border-bottom: 1px solid #333; padding-bottom: 5px; }
        td { padding: 5px 0; }
        #eval-bar { width: 12px; background: white; height: 450px; position: relative; border-radius: 2px; overflow: hidden; }
        #eval-fill { width: 100%; height: 50%; background: #333; position: absolute; bottom: 0; transition: height 0.5s; }
    </style>
</head>
<body>

    <div id="auth" style="width: 350px;">
        <div class="shadow-brand">SHADOWCHESS</div>
        <div class="sidebar" style="width: 100%;">
            <input id="user" placeholder="Tên kiện tướng">
            <input id="pass" type="password" placeholder="Mật khẩu">
            <button class="btn btn-play" onclick="auth('login')">Đăng Nhập</button>
            <button class="btn" onclick="auth('register')" style="background:#363532; color: #ccc;">Tạo Tài Khoản</button>
            <button class="btn btn-google" onclick="alert('Đang kết nối API Google...')">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Tiếp tục với Google
            </button>
        </div>
    </div>

    <div id="app" class="container" style="display:none">
        <div id="eval-bar"><div id="eval-fill"></div></div>
        <div style="flex: 1;">
            <div id="opp-time" class="timer">10:00</div>
            <div id="board"></div>
            <div id="my-time" class="timer">10:00</div>
        </div>
        <div class="sidebar">
            <h3 id="player-tag" style="margin:0; color:#81b64c;">-</h3>
            <select id="gameType" style="padding:10px; background:#312e2b; color:white; border:1px solid #403e3b;">
                <option value="bullet">Bullet (1 phút)</option>
                <option value="blitz" selected>Blitz (3 phút)</option>
                <option value="rapid">Rapid (10 phút)</option>
            </select>
            <button class="btn btn-play" id="findBtn" onclick="findMatch()">TÌM ĐỐI THỦ</button>
            
            <div class="leaderboard">
                <h4>🏆 Bảng Xếp Hạng</h4>
                <table id="lb-table">
                    <thead><tr><th>#</th><th>Tên</th><th>Elo</th></tr></thead>
                    <tbody id="lb-body"></tbody>
                </table>
            </div>
            <div id="analysis" style="background:#312e2b; padding:10px; border-radius:4px; display:none;">
                Đánh giá: <strong id="quality" style="color:#81b64c">-</strong>
                <button onclick="report()" style="background:none; border:none; color:red; cursor:pointer; float:right;">⚠ Tố cáo</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
        let socket = io();
        let game = new Chess(), board = null, myColor = 'w', room = null, me = null;

        function auth(type) {
            let username = $('#user').val(), password = $('#pass').val();
            fetch('/api/' + type, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(r => r.json()).then(data => {
                if(data.error) alert(data.error);
                else if(type === 'login') {
                    me = data.user;
                    $('#auth').hide(); $('#app').css('display', 'flex');
                    $('#player-tag').text(`${me.username} (${me.elo_blitz})`);
                    loadLB();
                } else alert("Đã đăng ký!");
            });
        }

        function loadLB() {
            let type = $('#gameType').val();
            fetch('/api/leaderboard/' + type).then(r => r.json()).then(data => {
                let h = '';
                data.forEach((p, i) => h += `<tr><td>${i+1}</td><td>${p.username}</td><td>${p['elo_'+type]}</td></tr>`);
                $('#lb-body').html(h);
            });
        }

        function findMatch() {
            $('#findBtn').text('Đang tìm...').prop('disabled', true);
            socket.emit('findMatch', { username: me.username, elo: me.elo_blitz, type: $('#gameType').val() });
        }

        socket.on('matchFound', (data) => {
            room = data.roomId; myColor = data.color;
            socket.emit('joinRoom', room);
            game.reset(); board.start();
            board.orientation(myColor === 'w' ? 'white' : 'black');
            $('#findBtn').text('Trận đấu bắt đầu!');
            $('#analysis').show();
        });

        function onDrop(source, target) {
            let move = game.move({from: source, to: target, promotion: 'q'});
            if (!move) return 'snapback';
            socket.emit('makeMove', {roomId: room, move, fen: game.fen()});
            analyze();
        }

        socket.on('opponentMove', (data) => {
            game.move(data.move);
            board.position(game.fen());
        });

        function analyze() {
            // Giả lập đánh giá (Trong thực tế sẽ gọi Stockfish)
            let scores = ["Brilliant !!", "Great !", "Best ★", "Inaccuracy ?!"];
            $('#quality').text(scores[Math.floor(Math.random()*scores.length)]);
        }

        function report() {
            fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ reportedUser: 'DoiThu' }) });
            alert("Đã báo cáo đối thủ gian lận!");
        }

        board = Chessboard('board', {draggable: true, position: 'start', onDrop: onDrop});
    </script>
</body>
</html>
